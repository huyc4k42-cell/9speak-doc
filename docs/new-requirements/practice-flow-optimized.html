<script>
/* ===================== DATA ===================== */
const PARTS=['Part 1','Part 2','Part 3'];
const TOPICS={
 'Part 1':[
   {id:'home',title:'Hometown',cat:'Chủ đề quen thuộc',q:5,time:'4–6 phút',tips:['Dùng thì hiện tại đơn cho thói quen, quá khứ cho kỷ niệm.','Nêu ví dụ cụ thể về địa điểm.'],
    questions:['Where is your hometown?','What do you like most about it?','Has it changed much in recent years?','Would you like to live there in the future?','What is the food like there?']},
   {id:'work',title:'Work & Study',cat:'Chủ đề quen thuộc',q:4,time:'4–5 phút',tips:['Mô tả công việc/ngành học bằng từ vựng chuyên đề.','Tránh lặp "job", "study".'],
    questions:['Do you work or study?','Why did you choose it?','What do you enjoy about it?','What are your future plans?']},
   {id:'hobby',title:'Hobbies',cat:'Sở thích',q:5,time:'4–6 phút',tips:['Dùng "I’m keen on…", "I’m into…".','Giải thích vì sao bạn thích.'],
    questions:['What do you do in your free time?','How long have you had this hobby?','Who did you learn it from?','Is it popular in your country?','Would you recommend it?']},
 ],
 'Part 2':[
   {id:'person',title:'Describe a person you admire',cat:'People',q:1,time:'3–4 phút',tips:['Theo 4 gạch đầu dòng của cue card.','Chuẩn bị 1 phút, nói liền mạch 1–2 phút.'],
    questions:['Describe a person you admire.\nYou should say:\n• who this person is\n• how you know them\n• what they do\n• and explain why you admire them.']},
 ],
 'Part 3':[
   {id:'edu',title:'Education & Society',cat:'Thảo luận',q:4,time:'4–6 phút',tips:['Đưa quan điểm 2 chiều.','Hỗ trợ ý kiến bằng lý do, ví dụ.'],
    questions:['How has education changed in your country?','Should education be free for everyone?','What role does technology play in learning?','Do you think exams are a fair way to assess students?']},
 ],
};
// 4 tiêu chí: key, label, màu, band, nội dung phân tích
const CRITERIA=[
 {key:'fluency',label:'Trôi chảy & Mạch lạc',score:6.5,bg:'#edf4ff',text:'#2563eb',labelTone:'#1e3a8a',
  analysis:['Tốc độ nói ~102 từ/phút — ổn định, hơi chậm ở câu dài.','2 quãng ngắt để tìm từ (giữa câu) làm gãy mạch nhẹ.','1 filler "uhm". Liên kết câu dùng "whenever", "and" — ổn nhưng đơn giản.','Gợi ý: thêm liên từ đa dạng (besides, as a result) và giảm ngắt giữa câu.']},
 {key:'lexical',label:'Từ vựng',score:6.0,bg:'#edf9f5',text:'#059669',labelTone:'#065f46',
  analysis:['Dải CEFR chủ yếu B1–B2; ít từ chuyên đề.','2 chỗ dùng từ cơ bản có thể nâng cấp (enjoy → cherish, friendly people → warm-hearted locals).','Lặp "town" 2 lần — cân nhắc paraphrase.','Gợi ý: dùng collocation tự nhiên: tranquil atmosphere, on the outskirts of.']},
 {key:'grammar',label:'Ngữ pháp',score:6.0,bg:'#fff7e8',text:'#d97706',labelTone:'#92400e',
  analysis:['1 lỗi thiếu trạng từ: "go" → "go back".','Câu chủ yếu là câu đơn; có 1 câu phức với "whenever…".','Chưa thử cấu trúc nâng cao (mệnh đề quan hệ, đảo ngữ).','Gợi ý: thêm relative clause: "…the locals, who always greet you with a smile".']},
 {key:'pronunciation',label:'Phát âm',score:6.5,bg:'#f7f0ff',text:'#7c3aed',labelTone:'#5b21b6',
  analysis:['Từ phát âm yếu: "work" /wɜːrk/ — nguyên âm chưa rõ.','Âm cuối /θ/ /ð/ đôi chỗ bị lược.','Ngữ điệu hơi phẳng ở cuối câu khẳng định.','Gợi ý: luyện tối thiểu các âm cuối và nhấn trọng âm từ khóa.']},
];
// Câu user — track changes: <FIX:wrong|right|kind|explain>
// điểm theo từng lượt (mô phỏng) để minh hoạ delta giữa các lượt
const SCORE_SEQ=[
  {overall:6.0,fluency:6.0,lexical:6.0,grammar:5.5,pronunciation:6.5},
  {overall:6.5,fluency:6.5,lexical:6.0,grammar:6.0,pronunciation:6.5},
  {overall:6.5,fluency:6.5,lexical:6.5,grammar:6.0,pronunciation:6.0},
  {overall:7.0,fluency:7.0,lexical:6.5,grammar:6.5,pronunciation:7.0},
];
function fmtDelta(d){return Math.abs(d).toFixed(1).replace(/\.0$/,'');}
function bandDelta(d){
  if(d>0)return `<span class="inline-flex items-center rounded-md bg-emerald-100 px-1.5 py-0.5 text-[11px] font-bold text-emerald-700">▲ +${fmtDelta(d)}</span>`;
  if(d<0)return `<span class="inline-flex items-center rounded-md bg-rose-100 px-1.5 py-0.5 text-[11px] font-bold text-rose-600">▼ −${fmtDelta(d)}</span>`;
  return `<span class="inline-flex items-center rounded-md bg-slate-100 px-1.5 py-0.5 text-[11px] font-bold text-slate-400">– 0</span>`;
}
function miniDelta(d){
  if(d>0)return `<span class="text-[10px] font-bold text-emerald-600">▲${fmtDelta(d)}</span>`;
  if(d<0)return `<span class="text-[10px] font-bold text-rose-500">▼${fmtDelta(d)}</span>`;
  return `<span class="text-[10px] font-bold text-slate-300">–</span>`;
}
function encourageLine(s,prev){
  if(!prev)return '';
  const d=+(s.overall-prev.overall).toFixed(1);
  if(d>0)return `<div class="rounded-lg bg-emerald-50 px-3 py-2 text-center text-[12px] font-medium text-emerald-700">🎉 Tiến bộ! Band tổng +${fmtDelta(d)} so với lần trước — giữ phong độ nhé!</div>`;
  if(d<0)return `<div class="rounded-lg bg-amber-50 px-3 py-2 text-center text-[12px] font-medium text-amber-700">Band tổng giảm ${fmtDelta(d)} so với lần trước — đừng nản, thử lại để cải thiện nhé! 💪</div>`;
  const ups=CRITERIA.filter(c=>s[c.key]>prev[c.key]).map(c=>c.label);
  const downs=CRITERIA.filter(c=>s[c.key]<prev[c.key]).map(c=>c.label);
  let detail='';
  if(ups.length)detail+=` <span class="text-emerald-600">↑ ${ups.join(', ')}</span>`;
  if(downs.length)detail+=`${ups.length?' · ':' '}<span class="text-rose-500">↓ ${downs.join(', ')}</span>`;
  return `<div class="rounded-lg bg-slate-50 px-3 py-2 text-center text-[12px] font-medium text-slate-500">Band tổng giữ nguyên so với lần trước.${detail||' Cố thêm chút nữa nhé!'}</div>`;
}
function trendCard(){
  const results=attempts.filter(a=>a.type==='result'&&a.scores);
  if(results.length<2)return '';
  const vals=results.map(r=>r.scores.overall);
  const n=vals.length,W=n*48+24,H=48,pad=16;
  const min=Math.min(...vals)-0.4,max=Math.max(...vals)+0.4,rng=(max-min)||1;
  const x=i=>pad+i*((W-pad*2)/(n-1)),y=v=>H-8-((v-min)/rng)*(H-20);
  const pts=vals.map((v,i)=>`${x(i)},${y(v)}`).join(' ');
  const dots=vals.map((v,i)=>`<circle cx="${x(i)}" cy="${y(v)}" r="3" fill="#4f46e5"/><text x="${x(i)}" y="${y(v)-7}" font-size="9" fill="#475569" text-anchor="middle">${v.toFixed(1)}</text>`).join('');
  const dd=+(vals[n-1]-vals[0]).toFixed(1);
  return `<div class="mx-3 mt-3 flex items-center gap-3 rounded-xl border border-slate-200 bg-white p-3 shadow-sm">
    <div class="text-[11px] font-semibold uppercase leading-tight tracking-wide text-slate-400">Tiến bộ<br>band tổng</div>
    <svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" class="overflow-visible"><polyline points="${pts}" fill="none" stroke="#c7d2fe" stroke-width="2"/>${dots}</svg>
    <div class="ml-auto text-right"><div class="text-[11px] text-slate-400">Lần 1 → ${n}</div><div class="text-sm font-bold ${dd>0?'text-emerald-600':dd<0?'text-rose-500':'text-slate-500'}">${dd>0?'+':''}${dd} band</div></div>
  </div>`;
}
const SENTENCE="My hometown is a small town near Hanoi. I really <FIX:enjoy|cherish|lexical|'enjoy' đúng nhưng cơ bản. 'cherish' (C1) diễn đạt tình cảm gắn bó mạnh và tự nhiên hơn.|Từ vựng> the peaceful atmosphere and the <FIX:friendly people|warm-hearted locals|lexical|'friendly people' ổn nhưng phổ thông. 'warm-hearted locals' nâng band từ vựng.|Từ vựng> there. Whenever I <FIX:go|go back|grammar|Thiếu trạng từ 'back'. 'go back' mới diễn đạt rõ ý quay về quê.|Ngữ pháp> , I can finally relax.";
// transcript off-topic mẫu + chủ đề mà user lỡ nói lệch sang (để nêu rõ trong card)
const OFFTOPIC_TRANSCRIPT="Well, honestly I think online advertising is incredibly powerful nowadays. Many brands spend huge budgets on social media campaigns to reach younger audiences, and influencers really shape what people buy these days.";
const OFFTOPIC_SUBJECT="quảng cáo";

/* ===================== RECORD STATE MACHINE ===================== */
function resetRecState(){recState='idle';clearInterval(recTimer);recSec=0;setMic();}
function setMic(){
  const m=document.getElementById('micBtn'),l=document.getElementById('recLabel');if(!m)return;
  m.className='flex h-14 w-14 items-center justify-center rounded-full p-0 text-white shadow-xl ring-4 transition-all hover:scale-105 '+(recState==='recording'?'bg-red-500 ring-red-500/20 hover:bg-red-600':recState==='processing'?'bg-slate-400 ring-slate-400/20 opacity-50 cursor-not-allowed':'bg-blue-600 ring-blue-600/20 hover:bg-blue-700');
  m.innerHTML=recState==='recording'?'<i data-lucide="square" class="h-6 w-6 fill-white"></i>':'<i data-lucide="mic" class="h-7 w-7"></i>';
  l.textContent=recState==='recording'?'Nhấn để dừng':recState==='processing'?'Đang chấm điểm…':attempts.length?'Ghi âm lại':'Bắt đầu ghi âm';
  icons();
}
let SIM='normal';
const DEMO_MAX=15; // giây — demo (thực tế đề xuất: Part 1: 90s, Part 2: 120s, Part 3: 90s)
function onSimChange(v){SIM=v;}
function fmt(s){return '0:'+String(s).padStart(2,'0');}
function updateRecLabel(){const l=document.getElementById('recLabel');if(!l||recState!=='recording')return;const left=DEMO_MAX-recSec;l.innerHTML=left<=5?`<span class="text-red-600">Đang ghi · ${fmt(recSec)} · tự dừng sau ${left}s</span>`:`Đang ghi · ${fmt(recSec)} / tối đa ${fmt(DEMO_MAX)}`;}
function toggleRec(){
  if(recState==='recording'){stopRec('manual');return;}
  if(recState!=='idle'&&recState!=='scored')return;
  if(SIM==='A1'||SIM==='A2'){pushError(SIM);return;} // lỗi mic — chưa ghi được
  startRec();
}
function startRec(){recState='recording';recSec=0;setMic();renderTimeline();updateRecLabel();
  recTimer=setInterval(()=>{recSec++;if(recSec>=DEMO_MAX){stopRec('auto');return;}updateRecLabel();},1000);
}
function stopRec(reason){
  clearInterval(recTimer);
  if(SIM==='B1'||(reason==='manual'&&recSec<3)){pushError('B1');return;} // quá ngắn — không chấm
  recState='processing';setMic();renderTimeline();
  const auto=reason==='auto';
  setTimeout(()=>{ // sau /assessments
    if(['B2','B3','B5','C1'].includes(SIM)){pushError(SIM);return;}
    recState='scored';
    const prevResults=attempts.filter(x=>x.type==='result'&&x.scores);
    const prevScores=prevResults.length?prevResults[prevResults.length-1].scores:null;
    const scores=SCORE_SEQ[prevResults.length%SCORE_SEQ.length];
    attempts.forEach(x=>{x.expanded=false;}); // lượt mới xuất hiện → tự thu gọn các lượt cũ
    attempts.push({id:attempts.length+1,type:'result',corr:'pending',expanded:true,autoStopped:auto,scores,prevScores});
    setMic();renderTimeline();
    setTimeout(()=>{const a=attempts[attempts.length-1];if(a){a.corr='completed';renderTimeline();}},2000);
  },1800);
}
function pushError(key){recState='idle';attempts.push({id:attempts.length+1,type:'error',errKey:key,recSec});setMic();renderTimeline();}
function retryRecord(){resetRecState();renderTimeline();const tl=document.getElementById('timeline');if(tl)tl.scrollTop=tl.scrollHeight;}

/* ===== PHÁT ÂM: card phân tích (ảnh 1) + panel luyện âm từng từ (ảnh 2) ===== */
function pronTranscript(){
  let out='';
  PRON_TOKENS.forEach((tk,idx)=>{
    if(tk.p){out+=tk.p;return;}
    const sp=idx===0?'':' ';const w=tk.t;
    if(tk.lvl==='ok'){out+=sp+`<span class="text-slate-700">${w}</span>`;return;}
    if(tk.lvl==='minor'){out+=sp+`<span onclick="openPronDrill('${w}')" class="cursor-pointer text-slate-400" style="border-bottom:2px dotted #cbd5e1">${w}</span>`;return;}
    if(tk.lvl==='light'){const i=w.toLowerCase().lastIndexOf(tk.yellow);const pre=w.slice(0,i),mid=w.slice(i,i+tk.yellow.length),post=w.slice(i+tk.yellow.length);
      out+=sp+`<span onclick="openPronDrill('${w}')" class="cursor-pointer" style="border-bottom:2px dotted #cbd5e1"><span class="text-slate-400">${pre}</span><span class="font-bold text-amber-500">${mid}</span><span class="text-slate-400">${post}</span></span>`;return;}
    // severe
    out+=sp+`<span onclick="openPronDrill('${w}')" class="cursor-pointer font-semibold text-rose-400">${w}</span> <span class="rounded-md px-1.5 py-0.5 align-middle text-[12.5px] font-medium tracking-wide" style="background:#dcfce7;color:#166534">/${tk.ipa}/</span>`;
  });
  return out;
}

function pronDist(){let good=0,fair=0,needs=0;PRON_BAND_TOKENS.forEach(t=>{if(t.b==='needs')needs++;else if(t.b==='fair')fair++;else good++;});const tot=PRON_BAND_TOKENS.length;return{good:Math.round(good/tot*100),fair:Math.round(fair/tot*100),needs:Math.round(needs/tot*100)};}
function bandTranscript(){return PRON_BAND_TOKENS.map(t=>{const w=t.t,bare=w.replace(/[^a-zA-Z]/g,'');if(!t.b)return `<span class="text-slate-700">${w}</span>`;const bg=t.b==='needs'?'#ffe4e6':'#fef3c7',cl=t.b==='needs'?'#be123c':'#92400e';return `<span onclick="openPronDrill('${bare}')" class="cursor-pointer rounded px-1 font-medium" style="background:${bg};color:${cl}">${w}</span>`;}).join(' ');}
function bandLegend(){return `<div class="mt-2 flex flex-wrap gap-3 text-[11px] text-slate-400"><span><span class="inline-block h-2.5 w-2.5 rounded align-middle bg-emerald-400"></span> Tốt ≥75%</span><span><span class="inline-block h-2.5 w-2.5 rounded align-middle bg-amber-300"></span> Khá 50–75%</span><span><span class="inline-block h-2.5 w-2.5 rounded align-middle bg-rose-300"></span> Cần cải thiện <50%</span></div>`;}
function pronAudio(){return `<div class="mt-3 flex items-center gap-2"><button class="flex h-9 w-9 items-center justify-center rounded-full border-2 border-teal-400 text-teal-500 hover:bg-teal-50"><i data-lucide="play" class="h-4 w-4 fill-current"></i></button><span class="text-xs tabular-nums text-slate-400">0:00</span><div class="relative h-1.5 flex-1 rounded-full bg-slate-200"><div class="absolute left-0 top-0 h-full w-2 rounded-full bg-teal-400"></div><div class="absolute -top-1 left-2 h-3.5 w-3.5 -translate-x-1/2 rounded-full border-2 border-white bg-sky-500 shadow"></div></div><span class="text-xs tabular-nums text-slate-400">0:24</span></div>`;}
function mistakeCards(){return PRON_MISTAKES.map(m=>`<div class="rounded-xl border border-slate-200 p-3">

   <div class="mt-2 flex items-center justify-between text-[12px]"><span class="text-emerald-600">✓ Đúng: <span class="font-medium">/${m.correct}/</span></span><button title="Nghe âm chuẩn" class="text-emerald-500 hover:text-emerald-700"><i data-lucide="volume-2" class="h-3.5 w-3.5"></i></button></div>
   <div class="mt-1 flex items-center justify-between text-[12px]"><span class="text-rose-500">✗ Bạn nói: <span class="font-medium">/${m.you}/</span></span><button title="Nghe lại đoạn bạn nói" class="text-rose-400 hover:text-rose-600"><i data-lucide="volume-2" class="h-3.5 w-3.5"></i></button></div>
   <div class="mt-1.5 flex items-center justify-between gap-2"><span class="truncate text-[11px] italic text-slate-400">"${m.ctx}"</span><button onclick="openPronDrill('${m.word}')" class="shrink-0 rounded-md bg-violet-50 px-2 py-1 text-[11px] font-semibold text-violet-600 hover:bg-violet-100">Luyện ›</button></div>
  </div>`).join('');}
function soundCards(){return PRON_SOUNDS.map(s=>`<div class="rounded-xl border border-slate-200 p-3"><div class="flex items-center gap-2 text-[13px] font-bold text-slate-800"><i data-lucide="volume-2" class="h-4 w-4 text-violet-500"></i> ${s.sound}</div><p class="mt-1 text-[12px] leading-5 text-slate-500">${s.tip}</p><div class="mt-2 flex flex-wrap gap-1.5">${s.words.map(w=>`<button onclick="openPronDrill('${w}')" class="rounded-full bg-slate-100 px-2.5 py-1 text-[11px] font-medium text-slate-600 hover:bg-slate-200">${w}</button>`).join('')}</div></div>`).join('');}
function prosodyBlock(){return `<div class="space-y-2">
   ${PRON_PROSODY.stress.map(s=>`<div class="flex items-center justify-between gap-2 rounded-lg bg-slate-50 px-3 py-2 text-[12px]"><span class="font-semibold text-slate-700">${s.word}</span><span class="text-slate-500">✓ <b class="text-emerald-600">${s.correct}</b> · ✗ <span class="text-rose-500">${s.you}</span></span></div>`).join('')}

   <p class="text-[12px] leading-6 text-slate-500"><b class="text-slate-700">Ngữ điệu:</b> ${PRON_PROSODY.intonation}</p>
  </div>`;}

/* ===== TRÔI CHẢY & MẠCH LẠC: phân tích chi tiết ===== */
const FLU={wpm:102,badge:'Ngắt nghỉ hơi dài',coherenceBadge:'Tròn ý nhưng chưa sâu',coherenceNote:'Cần đào sâu một ý với ví dụ cụ thể, tránh chỉ liệt kê chung chung.',linkers:['and','whenever'],linkerSuggest:'besides, as a result, for instance'};
const FLU_TOKENS=[
 {t:'My'},{t:'hometown'},{t:'is'},{t:'a'},{t:'small'},{t:'town'},{t:'near'},{t:'Hanoi.',p:'good'},
 {t:'I'},{t:'really'},{t:'enjoy'},{t:'the'},{t:'peaceful'},{t:'atmosphere',p:'med'},
 {t:'and'},{t:'the'},{t:'friendly'},{t:'people'},{t:'there.',p:'good'},
 {t:'Whenever'},{t:'I'},{t:'go',p:'long'},{t:'back,'},{t:'I'},{t:'can'},{t:'finally'},{t:'relax',p:'med'},
 {t:'and'},{t:'forget'},{t:'about'},{t:'work',filler:'uhm'},{t:'in'},{t:'the'},{t:'city.',p:'good'},
];
function pauseMark(p){const col=p==='good'?'#22c55e':p==='med'?'#f59e0b':'#ef4444';const w=p==='long'?'20px':p==='med'?'14px':'9px';return ` <span class="inline-block align-middle rounded-full" style="width:${w};height:8px;background:${col}"></span>`;}
function pauseTranscript(){return FLU_TOKENS.map(tk=>{let s=tk.t;if(tk.filler)s+=` <span class="rounded bg-rose-500 px-1 align-middle text-[10px] font-bold text-white">${tk.filler}</span>`;if(tk.p)s+=pauseMark(tk.p);return s;}).join(' ');}
function pauseCounts(){const g=FLU_TOKENS.filter(t=>t.p==='good').length,m=FLU_TOKENS.filter(t=>t.p==='med').length,l=FLU_TOKENS.filter(t=>t.p==='long').length,f=FLU_TOKENS.filter(t=>t.filler).length;return `<div class="flex flex-wrap gap-1.5 text-[11px]"><span class="rounded-md bg-emerald-50 px-2 py-1 font-semibold text-emerald-700">🟢 ${g} ngắt tốt</span><span class="rounded-md bg-amber-50 px-2 py-1 font-semibold text-amber-700">🟡 ${m} ngắt vừa</span><span class="rounded-md bg-rose-50 px-2 py-1 font-semibold text-rose-700">🔴 ${l} ngắt dài</span><span class="rounded-md bg-slate-100 px-2 py-1 font-semibold text-slate-600">${f} filler</span></div>`;}
function speedGauge(){const wpm=FLU.wpm;const pct=Math.max(2,Math.min(98,(wpm-60)/140*100));const ticks=[60,90,120,150,180,200].map(t=>`<span class="absolute -translate-x-1/2" style="left:${(t-60)/140*100}%">${t}</span>`).join('');
  return `<div class="rounded-xl border border-slate-200 p-3">
    <div class="flex items-center justify-between"><div class="flex items-center gap-2 text-sm font-semibold text-slate-800"><i data-lucide="zap" class="h-4 w-4 text-amber-500"></i> Tốc độ nói</div><div class="text-lg font-bold text-indigo-600">${wpm}<span class="ml-1 text-[11px] font-normal text-slate-400">từ/phút</span></div></div>
    <div class="relative mt-4 mb-1 h-3 text-[9px] text-slate-400">${ticks}</div>
    <div class="relative h-2.5 rounded-full" style="background:linear-gradient(90deg,#ef4444 0%,#f59e0b 22%,#22c55e 43%,#22c55e 64%,#f59e0b 82%,#ef4444 100%)"><div class="absolute top-1/2 h-5 w-1 -translate-x-1/2 -translate-y-1/2 rounded bg-slate-900" style="left:${pct}%"></div></div>
    <div class="mt-1.5 flex justify-between text-[10px] font-semibold"><span class="text-rose-500">Chậm</span><span class="text-emerald-600">Tốt 120–150</span><span class="text-rose-500">Nhanh</span></div>
    <p class="mt-2 text-[11px] text-slate-400">Giám khảo thích nhịp ~120–150 từ/phút — bạn đang hơi chậm.</p>
  </div>`;}
function fluAudio(){return `<div class="mt-3 flex items-center gap-3"><button class="flex h-9 w-9 items-center justify-center rounded-full border-2 border-teal-400 text-teal-500 hover:bg-teal-50"><i data-lucide="play" class="h-4 w-4 fill-current"></i></button><span class="text-xs tabular-nums text-slate-400">0:00</span><div class="relative h-1.5 flex-1 rounded-full bg-slate-200"><div class="absolute left-0 top-0 h-full w-2 rounded-full bg-teal-400"></div><div class="absolute -top-1 left-2 h-3.5 w-3.5 -translate-x-1/2 rounded-full border-2 border-white bg-sky-500 shadow"></div></div><span class="text-xs tabular-nums text-slate-400">0:32</span></div>`;}
function fluTranscriptBox(){return `<div class="rounded-xl border border-slate-100 bg-slate-50/50 p-3 text-[13px] leading-[2.2] text-slate-700">${pauseTranscript()}</div>`;}
function fluLegend(){return `<div class="mt-2 flex flex-wrap items-center gap-3 text-[11px] text-slate-400"><span><span class="inline-block h-2.5 w-2.5 rounded-full bg-emerald-500 align-middle"></span> ngắt tốt</span><span><span class="inline-block h-2.5 w-2.5 rounded-full bg-amber-500 align-middle"></span> ngắt vừa</span><span><span class="inline-block h-2.5 w-2.5 rounded-full bg-rose-500 align-middle"></span> ngắt dài</span><span><span class="rounded bg-rose-500 px-1 text-[9px] font-bold text-white">uhm</span> filler</span></div>`;}
function coherenceBlock(){return `<div class="flex items-center justify-between gap-2"><div class="text-sm font-bold text-slate-800">Mạch lạc <span class="text-[11px] font-normal text-slate-400">(coherence)</span></div><span class="rounded-full bg-teal-100 px-2.5 py-1 text-[11px] font-bold text-teal-700">${FLU.coherenceBadge}</span></div>
  <p class="mt-1 text-[12px] leading-5 text-slate-500">${FLU.coherenceNote}</p>
  <div class="mt-2 text-[11px] leading-5 text-slate-500">Liên từ đã dùng: ${FLU.linkers.map(w=>`<span class="rounded bg-indigo-50 px-1.5 py-0.5 font-medium text-indigo-600">${w}</span>`).join(' ')} · Gợi ý thêm: <span class="text-slate-600">${FLU.linkerSuggest}</span></div>`;}
function fluencyHead(){return `<div class="flex items-center justify-between gap-2"><div class="text-sm font-bold text-slate-800">Trôi chảy <span class="text-[11px] font-normal text-slate-400">(fluency)</span></div><span class="rounded-full bg-slate-800 px-2.5 py-1 text-[11px] font-bold text-white">${FLU.badge}</span></div>`;}
function speedLabel(wpm){
  if(wpm<90)return{text:'quá chậm',color:'#e11d48'};
  if(wpm<120)return{text:'hơi chậm',color:'#d97706'};
  if(wpm<=150)return{text:'tốt',color:'#059669'};
  if(wpm<=170)return{text:'hơi nhanh',color:'#d97706'};
  return{text:'quá nhanh',color:'#e11d48'};
}

/* ===== TỪ VỰNG: phân tích chi tiết (CEFR + nâng cấp) ===== */
const CEFR_COLORS={A1:'#64748b',A2:'#22c55e',B1:'#3b82f6',B2:'#f59e0b',C1:'#f97316',C2:'#ef4444'};
const VOC={score:6.0,badge:'Chủ yếu A1–B1',note:'Đa số là từ cơ bản — thêm từ B2+ và collocation chuyên đề để nâng band Từ vựng.',
  cefr:{A1:40,A2:22,B1:24,B2:10,C1:4,C2:0},
  tips:[
    {word:'small',alts:['tiny','compact','modest']},
    {word:'really',alts:['genuinely','truly','thoroughly']},
    {word:'peaceful',alts:['tranquil','serene','idyllic']},
    {word:'relax',alts:['unwind','de-stress','recharge']},
  ]};
const VOC_TOKENS=[
 ['My','A1'],['hometown','B1'],['is','A1'],['a','A1'],['small','A1'],['town','A1'],['near','A1'],['Hanoi.','A1'],
 ['I','A1'],['really','A1'],['enjoy','A2'],['the','A1'],['peaceful','B2'],['atmosphere','B2'],['and','A1'],['the','A1'],['friendly','A2'],['people','A1'],['there.','A1'],
 ['Whenever','B1'],['I','A1'],['go','A1'],['back,','A1'],['I','A1'],['can','A1'],['finally','B1'],['relax','B1'],['and','A1'],['forget','A2'],['about','A1'],['work','A1'],['in','A1'],['the','A1'],['city.','A1'],
];
function cefrBars(){return `<div class="space-y-2">`+Object.keys(VOC.cefr).map(lv=>{const pct=VOC.cefr[lv],col=CEFR_COLORS[lv];
  return `<div class="flex items-center gap-2"><span class="w-7 shrink-0 rounded px-1 py-0.5 text-center text-[10px] font-bold text-white" style="background:${col}">${lv}</span><div class="h-2 flex-1 rounded-full bg-slate-100"><div class="h-full rounded-full" style="width:${pct}%;background:${col}"></div></div><span class="w-9 shrink-0 text-right text-[11px] font-semibold text-slate-500">${pct}%</span></div>`;}).join('')+`</div>`;}
function vocTranscript(){return VOC_TOKENS.map(([w,lv])=>{const col=lv==='A1'?'#334155':CEFR_COLORS[lv];const ul=lv!=='A1'?`border-bottom:2px solid ${col};`:'';return `<span title="Cấp độ ${lv}" class="${lv!=='A1'?'font-medium':''}" style="color:${col};${ul}">${w}</span>`;}).join(' ');}
function cefrLegend(){return `<div class="flex flex-wrap gap-2.5 text-[11px] text-slate-500">`+Object.keys(CEFR_COLORS).map(lv=>`<span><span class="inline-block h-2.5 w-2.5 rounded-full align-middle" style="background:${CEFR_COLORS[lv]}"></span> ${lv}</span>`).join('')+`</div>`;}
function vocTips(){return VOC.tips.map(t=>`<div class="rounded-xl border border-slate-200 p-3"><div class="text-sm font-bold capitalize text-slate-800">${t.word}</div><div class="mt-0.5 text-[11px] text-slate-400">Thử dùng:</div><div class="mt-1.5 flex flex-wrap gap-1.5">${t.alts.map(a=>`<span class="rounded-full bg-indigo-50 px-2.5 py-1 text-[12px] font-medium text-indigo-600">${a}</span>`).join('')}</div></div>`).join('');}

/* ===== NGỮ PHÁP: phân tích chi tiết (độ chính xác + độ đa dạng + cấu trúc) ===== */
const GRAM={score:6.0,badge:'Cơ bản ổn — ít câu phức',
  accurateSentences:3,totalSentences:4,
  simplePct:65,complexPct:35,
  errorTypes:[{label:'Thì động từ',count:2},{label:'Mạo từ (a/the)',count:1},{label:'Giới từ',count:1}],
  structures:[
    {name:'Mệnh đề quan hệ (who/which)',status:'ok'},
    {name:'Câu điều kiện loại 1',status:'ok'},
    {name:'Câu điều kiện loại 2',status:'fail'},
    {name:'Câu bị động',status:'todo'},
    {name:'Đảo ngữ / Cleft',status:'todo'},
  ],
  suggestions:[
    {tip:'Thêm mệnh đề quan hệ',ex:'…the locals, who always greet you with a smile.'},
    {tip:'Dùng câu điều kiện loại 2',ex:'If I had more time, I would visit more often.'},
  ]};
const GRAM_SENTENCES=[
  {t:'My hometown is a small town near Hanoi.',ok:true,type:'simple'},
  {t:'I really enjoy the peaceful atmosphere and the friendly people there.',ok:true,type:'complex'},
  {t:'Whenever I go back, I can finally relax.',ok:true,type:'complex'},
  {t:'It is the place where I grew up and make many memories.',ok:false,type:'complex'},
];
function gramAccuracy(){const a=GRAM.accurateSentences,t=GRAM.totalSentences,pct=Math.round(a/t*100);
  return `<div><div class="flex items-center justify-between text-[12px]"><span class="font-medium text-slate-600">Câu không lỗi</span><span class="font-bold text-slate-800">${a}/${t} câu</span></div><div class="mt-1.5 h-2 rounded-full bg-slate-100"><div class="h-full rounded-full bg-emerald-500" style="width:${pct}%"></div></div></div>`;}
function gramComplexity(){return `<div class="space-y-2">
   <div class="flex items-center gap-2 text-[12px]"><span class="w-16 shrink-0 text-slate-600">Câu đơn</span><div class="h-2 flex-1 rounded-full bg-slate-100"><div class="h-full rounded-full bg-slate-400" style="width:${GRAM.simplePct}%"></div></div><span class="w-9 text-right font-semibold text-slate-500">${GRAM.simplePct}%</span></div>
   <div class="flex items-center gap-2 text-[12px]"><span class="w-16 shrink-0 text-slate-600">Câu phức</span><div class="h-2 flex-1 rounded-full bg-slate-100"><div class="h-full rounded-full bg-indigo-500" style="width:${GRAM.complexPct}%"></div></div><span class="w-9 text-right font-semibold text-slate-500">${GRAM.complexPct}%</span></div>
  </div>`;}
function gramErrorTypes(){return `<div class="space-y-1.5">`+GRAM.errorTypes.map(e=>`<div class="flex items-center justify-between text-[12px]"><span class="text-slate-600">${e.label}</span><span class="rounded-md bg-rose-50 px-2 py-0.5 font-semibold text-rose-600">${e.count} lỗi</span></div>`).join('')+`</div>`;}
function gramStructures(){const meta={ok:{i:'check-circle-2',c:'#059669',t:'Dùng đúng'},fail:{i:'alert-triangle',c:'#d97706',t:'Chưa đúng'},todo:{i:'lightbulb',c:'#94a3b8',t:'Nên thử'}};
  return `<div class="space-y-1.5">`+GRAM.structures.map(s=>{const m=meta[s.status];return `<div class="flex items-center justify-between gap-2 text-[12px]"><span class="text-slate-700">${s.name}</span><span class="flex shrink-0 items-center gap-1 font-medium" style="color:${m.c}"><i data-lucide="${m.i}" class="h-3.5 w-3.5"></i> ${m.t}</span></div>`;}).join('')+`</div>`;}
function gramSuggestions(){return GRAM.suggestions.map(s=>`<div class="rounded-xl border border-slate-200 p-3"><div class="text-[13px] font-bold text-slate-800">💡 ${s.tip}</div><p class="mt-1 text-[12px] italic leading-6 text-slate-500">“${s.ex}”</p></div>`).join('');}
function gramSentences(){return `<div class="space-y-2">`+GRAM_SENTENCES.map(s=>{const col=s.ok?'#22c55e':'#f59e0b';const bd=s.type==='complex'?{t:'Câu phức',c:'#4f46e5',bg:'#eef2ff'}:{t:'Câu đơn',c:'#64748b',bg:'#f1f5f9'};
  return `<div class="flex gap-2.5 rounded-lg border border-slate-100 bg-slate-50/50 p-2.5"><span class="w-1 shrink-0 rounded-full" style="background:${col}"></span><div class="flex-1"><p class="text-[13px] leading-6 text-slate-700">${s.t}</p><span class="mt-1 inline-block rounded px-1.5 py-0.5 text-[10px] font-semibold" style="color:${bd.c};background:${bd.bg}">${bd.t}</span></div><span class="shrink-0 text-[11px] font-medium" style="color:${col}">${s.ok?'Không lỗi':'Có lỗi'}</span></div>`;}).join('')+`</div>`;}
function gramLegend(){return `<div class="mt-2 flex flex-wrap gap-3 text-[11px] text-slate-400"><span><span class="inline-block h-2.5 w-2.5 rounded-full bg-emerald-500 align-middle"></span> câu không lỗi</span><span><span class="inline-block h-2.5 w-2.5 rounded-full bg-amber-500 align-middle"></span> câu có lỗi</span><span>· nhãn Câu đơn / Câu phức</span></div>`;}
// rail (gọn)
function gramCard(c,it){

    <div class="flex items-start justify-between"><div class="flex items-center gap-2 text-sm font-semibold" style="color:${c.labelTone}"><span class="h-2.5 w-2.5 rounded-full" style="background:${c.text}"></span> Phân tích · ${c.label}</div>
      <div class="flex items-center gap-1.5"><button onclick="openGramModal()" class="rounded-md border border-slate-200 px-2 py-0.5 text-[11px] font-medium text-slate-500 hover:bg-slate-50">⛶ Bản đầy đủ</button><button onclick="railRemove('${it}')" class="text-slate-300 hover:text-slate-500"><i data-lucide="x" class="h-4 w-4"></i></button></div></div>

    <div class="mt-2 flex items-center justify-between gap-2"><span class="text-[12px] font-semibold text-slate-700">Độ chính xác & đa dạng</span><span class="rounded-full bg-amber-100 px-2 py-0.5 text-[11px] font-bold text-amber-700">${GRAM.badge}</span></div>

/* ===================== TIMELINE ===================== */
function renderTimeline(){
  const tl=document.getElementById('timeline');let html='';
  if(attempts.length===0&&recState!=='recording'&&recState!=='processing'){
    html=`<div class="flex h-full flex-col items-center justify-center space-y-3 text-slate-400"><i data-lucide="mic-2" class="h-12 w-12 text-slate-300"></i><p>Chưa có lượt thử nào. Bấm ghi âm để bắt đầu!</p></div>`;
  }else{
    html='<div class="space-y-8">';
    attempts.forEach(a=>{
      if(a.type==='error'&&a.errKey==='C1'){ // off-topic: vẫn hiện transcript user
        html+=`<div class="space-y-3">
          <div class="flex justify-end"><div class="relative max-w-[80%] rounded-xl rounded-tr-sm bg-blue-600 p-3 text-white shadow-sm"><div class="mb-2 text-xs font-medium uppercase tracking-wider opacity-80">Lần ${a.id}</div><p class="text-[13px] leading-relaxed">${OFFTOPIC_TRANSCRIPT}</p></div></div>
          <div class="flex justify-start"><div class="w-full max-w-[92%]">${offTopicCard()}</div></div></div>`;
        return;
      }
      if(a.type==='error'){
        const recorded=!['A1','A2'].includes(a.errKey); // A1/A2: chưa ghi được nên không có bong bóng user
        html+=`<div class="space-y-3">
          ${recorded?`<div class="flex justify-end"><div class="relative max-w-[80%] rounded-xl rounded-tr-sm bg-blue-600 p-3 text-white shadow-sm"><div class="mb-1 text-xs font-medium uppercase tracking-wider opacity-80">Lần ${a.id}</div><div class="flex items-center gap-2 text-[13px] text-blue-50"><i data-lucide="mic" class="h-3.5 w-3.5"></i> Bản ghi ${a.recSec||0}s</div></div></div>`:''}
          <div class="flex justify-start"><div class="w-full max-w-[92%]">${errorCard(a)}</div></div></div>`;
        return;
      }
      html+=`<div class="space-y-3">
        <div class="flex items-center gap-2 pl-1 text-xs font-semibold uppercase tracking-wider text-slate-400">Lần ${a.id}${a.autoStopped?`<span class="inline-flex items-center gap-1 rounded-md bg-slate-100 px-2 py-0.5 text-[11px] font-medium normal-case text-slate-500"><i data-lucide="timer" class="h-3 w-3"></i> Đã tự dừng ở giới hạn</span>`:''}</div>
        <div class="w-full">${evalPanel(a)}</div></div>`;});
    if(recState==='recording')html+=`<div class="flex justify-end"><div class="flex h-16 w-64 items-center justify-center gap-1.5 overflow-hidden rounded-xl rounded-tr-sm bg-blue-600 p-3 shadow-sm">${[34,52,74,46,68,88,62,40,56,80,50,72].map((h,i)=>`<div class="rec-bar w-1.5 rounded-full bg-white/80" style="height:${h}%;animation-delay:${i*.05}s"></div>`).join('')}</div></div>`;
    if(recState==='processing')html+=`<div class="flex justify-start"><div class="flex items-center gap-2 rounded-xl rounded-tl-sm border border-slate-200 bg-white p-3 shadow-sm"><i data-lucide="refresh-cw" class="h-5 w-5 animate-spin text-blue-500"></i><span class="text-sm font-medium text-slate-600">AI đang phân tích và chấm điểm...</span></div></div>`;
    html+='<div class="h-4"></div></div>';
  }
  tl.innerHTML=html;
  const tb=document.getElementById('trendBar');if(tb)tb.innerHTML=trendCard();
  icons();
}

/* ===================== EVALUATION PANEL (TỐI ƯU) ===================== */
function evalPanel(a){
  const done=a.corr==='completed';
  const sc=a.scores||SCORE_SEQ[0], prev=a.prevScores||null;
  // 4 thẻ điểm thành phần = nút mở phân tích (kèm tooltip + delta so với lượt trước)
  const scoreCards=CRITERIA.map(c=>{const val=sc[c.key];const d=prev?+(val-prev[c.key]).toFixed(1):null;
    return `<div ${done?`onclick="openAnalysis('${c.key}')"`:''} class="group relative rounded-xl border border-white/60 p-2 shadow-sm transition ${done?'cursor-pointer hover:-translate-y-0.5 hover:shadow-md':''}" style="background:${c.bg}">
      <div class="flex items-center justify-between gap-1.5"><span class="text-[11px] font-semibold leading-tight" style="color:${c.labelTone}">${c.label}</span><span class="flex items-center gap-1"><span class="text-sm font-bold" style="color:${c.text}">${val.toFixed(1)}</span>${d!==null?miniDelta(d):''}</span></div>
      ${done?`<div class="pointer-events-none absolute left-1/2 top-full z-30 mt-2 hidden -translate-x-1/2 whitespace-nowrap rounded-lg bg-slate-900 px-2.5 py-1.5 text-[11px] font-medium text-white shadow-lg group-hover:block">Xem phân tích · ${c.label}<span class="absolute -top-1 left-1/2 h-2 w-2 -translate-x-1/2 rotate-45 bg-slate-900"></span></div>`:''}
    </div>`;}).join('');
  return `<div class="overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm"><div class="space-y-3 p-3 sm:p-4">
    <!-- header band -->
    <div class="rounded-xl border border-slate-200 bg-slate-50/70 p-3">
      <div class="flex items-start justify-between gap-4">
        <div class="flex items-center gap-2"><div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-full bg-emerald-100 text-emerald-600"><i data-lucide="sparkles" class="h-5 w-5 fill-current"></i></div><div class="text-[15px] font-semibold text-slate-900">AI Chấm điểm</div></div>
        <div class="flex items-center gap-2"><div class="text-[26px] font-bold leading-none tracking-tight text-slate-950">${sc.overall.toFixed(1)}</div>${prev?bandDelta(+(sc.overall-prev.overall).toFixed(1)):''}</div>
      </div>
      <div class="mt-5 grid grid-cols-4 gap-2">${scoreCards}</div>
    </div>
    ${prev?encourageLine(sc,prev):''}
    ${done?`<p class="-mt-1 text-center text-[12px] text-slate-400">Bấm vào từng tiêu chí ở trên để xem phân tích chi tiết ở cột <b class="text-slate-500">AI hỗ trợ</b> →</p>`:''}
    ${a.expanded?`
    <!-- Câu trả lời đã sửa (thay 3 tab) -->
    <div class="rounded-xl border border-slate-200 bg-white p-3 sm:p-3">
      <div class="mb-3 flex items-center gap-2 text-[13px] font-semibold text-slate-900"><i data-lucide="spell-check-2" class="h-5 w-5 text-emerald-600"></i> Câu trả lời của bạn — đã sửa lỗi</div>
      ${done?`<div class="rounded-xl border border-slate-200 bg-slate-50/60 p-3 text-[13px] leading-7 text-slate-800">${correctedSentence()}</div>
        <div class="mt-2 flex items-center gap-2 text-[11px] text-slate-400"><span><span class="fix-del">gạch bỏ</span> = lỗi</span><span><span class="fix-ins">thay thế</span> = bản sửa</span><span>· bấm vào chỗ sửa để xem giải thích</span></div>`
        :`<div class="space-y-2 animate-pulse"><div class="h-3 w-full rounded-full bg-slate-200"></div><div class="h-3 w-11/12 rounded-full bg-slate-200"></div><div class="h-3 w-3/4 rounded-full bg-slate-200"></div><p class="pt-1 text-xs text-slate-400">AI đang phân tích & sửa lỗi từ vựng / ngữ pháp…</p></div>`}
    </div>
    <!-- rewrite trigger (kết quả hiện ở rail) -->
    <div>
      <div class="mb-1.5 text-[11px] font-semibold uppercase tracking-wide text-slate-400">Cải thiện câu trả lời</div>
      <div class="grid grid-cols-3 gap-1.5">
        <button onclick="${done?`doImprove('vocab')`:''}" ${done?'':'disabled'} class="rounded-md border px-2 py-2 text-[11.5px] font-medium ${done?'border-blue-200 bg-blue-50/60 text-blue-700 hover:bg-blue-50':'border-slate-200 bg-slate-50 text-slate-300 cursor-not-allowed'}">Nâng từ vựng</button>
        <button onclick="${done?`doImprove('grammar')`:''}" ${done?'':'disabled'} class="rounded-md border px-2 py-2 text-[11.5px] font-medium ${done?'border-amber-200 bg-amber-50/60 text-amber-700 hover:bg-amber-50':'border-slate-200 bg-slate-50 text-slate-300 cursor-not-allowed'}">Đa dạng ngữ pháp</button>
        <button onclick="${done?`doImprove('idea')`:''}" ${done?'':'disabled'} class="rounded-md border px-2 py-2 text-[11.5px] font-medium ${done?'border-emerald-200 bg-emerald-50/60 text-emerald-700 hover:bg-emerald-50':'border-slate-200 bg-slate-50 text-slate-300 cursor-not-allowed'}">Phát triển ý sâu</button>
      </div>
      <p class="mt-1.5 text-[11px] text-slate-400">Kết quả + cách nâng cấp hiện ở cột AI hỗ trợ →</p>
    </div>
    `:`<div class="rounded-xl border border-slate-200 bg-white p-3 sm:p-3"><p class="line-clamp-2 text-[13px] leading-6 text-slate-900">My hometown is a small town near Hanoi. I really enjoy the peaceful atmosphere…</p></div>`}
    <div class="flex justify-center"><button onclick="toggleEval(${a.id})" class="inline-flex items-center gap-1.5 rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-medium text-slate-500 shadow-sm hover:bg-slate-50">${a.expanded?'Thu gọn':'Mở rộng'} <i data-lucide="${a.expanded?'chevron-up':'chevron-down'}" class="h-4 w-4"></i></button></div>
  </div></div>`;
}
let FIX_DATA=[];
function correctedSentence(){
  FIX_DATA=[];
  return SENTENCE.replace(/<FIX:([^|]+)\|([^|]+)\|([^|]+)\|([^|]+)\|([^>]+)>/g,(m,wrong,right,kind,explain,label)=>{
    const idx=FIX_DATA.length;
    FIX_DATA.push({wrong,right,explain,label});
    return `<span class="fix-del">${wrong}</span> <span class="fix-ins" onclick="showFix(event,${idx})">${right}</span>`;
  });
}
function showFix(e,idx){
  e.stopPropagation();
  const d=FIX_DATA[idx]; if(!d)return;
  const p=document.getElementById('fixpop');
  p.innerHTML=`<div class="mb-1 inline-flex items-center gap-1 rounded-md bg-slate-100 px-2 py-0.5 text-[11px] font-semibold text-slate-600">${d.label}</div>
    <div class="text-[13px] leading-5"><span class="fix-del">${d.wrong}</span> → <span class="font-semibold text-emerald-700">${d.right}</span></div>
    <p class="mt-1.5 text-[12.5px] leading-5 text-slate-600">${d.explain}</p>`;
  p.classList.remove('hidden');
  const x=Math.min(e.clientX+10,window.innerWidth-280),y=e.clientY+12;
  p.style.left=x+'px';p.style.top=y+'px';icons();
}
document.addEventListener('click',e=>{const p=document.getElementById('fixpop');if(p&&!p.contains(e.target)&&!(e.target.classList&&e.target.classList.contains('fix-ins')))p.classList.add('hidden');});
function toggleEval(id){const a=attempts.find(x=>x.id===id);a.expanded=!a.expanded;renderTimeline();}

/* ===================== RAIL (AI hỗ trợ) — chèn thêm card phân tích ===================== */
function renderRail(){
  const b=document.getElementById('railBody');
  if(railItems.length===0){b.innerHTML=`<div class="flex h-full flex-col items-center justify-center gap-2 px-6 text-center text-slate-400"><i data-lucide="sparkles" class="h-8 w-8 text-slate-200"></i><p class="text-sm leading-6">Phân tích từng tiêu chí, câu mẫu, từ vựng & ghi chú sẽ hiện ở đây.</p></div>`;icons();return;}
  b.innerHTML=railItems.map(it=>{
    if(it==='loading')return `<div class="rounded-xl border border-slate-200 bg-white p-3 shadow-sm"><div class="flex items-center gap-2 text-sm font-semibold text-slate-900"><i data-lucide="loader-circle" class="h-4 w-4 animate-spin"></i> Đang tạo câu cải thiện…</div></div>`;
    if(it.startsWith('an:')){const c=CRITERIA.find(x=>x.key===it.slice(3));if(!c)return '';
      if(c.key==='pronunciation')return pronCard(c,it);
      if(c.key==='fluency')return fluencyCard(c,it);
      if(c.key==='lexical')return vocabCard(c,it);
      if(c.key==='grammar')return gramCard(c,it);
      return `<div class="rounded-xl border bg-white p-3 shadow-sm" style="border-color:${c.text}33">
        <div class="flex items-start justify-between"><div class="flex items-center gap-2 text-sm font-semibold" style="color:${c.labelTone}"><span class="h-2.5 w-2.5 rounded-full" style="background:${c.text}"></span> Phân tích · ${c.label}</div>
          <button onclick="railRemove('${it}')" class="text-slate-300 hover:text-slate-500"><i data-lucide="x" class="h-4 w-4"></i></button></div>
        <div class="mt-1 text-xs" style="color:${c.text}">Điểm tiêu chí: <b>${c.score.toFixed(1)}</b></div>
        <ul class="mt-3 space-y-2">${c.analysis.map(t=>`<li class="flex items-start gap-2 text-[13px] leading-6 text-slate-700"><i data-lucide="dot" class="mt-0.5 h-4 w-4 shrink-0" style="color:${c.text}"></i><span>${t}</span></li>`).join('')}</ul></div>`;
    }
    if(it==='sample')return `<div class="rounded-xl bg-slate-100 p-3"><div class="flex items-start gap-2"><span class="mt-1 flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-blue-600 text-white"><i data-lucide="volume-2" class="h-4 w-4"></i></span><p class="text-[13px] italic leading-6 text-slate-600">&quot;My hometown is a charming little town on the outskirts of Hanoi. What I treasure most is its tranquil atmosphere…&quot;</p></div></div>`;
    if(it==='vocab')return `<div class="grid gap-2 sm:grid-cols-2">${[['tranquil','yên bình','C1','#7c3aed'],['on the outskirts of','ở ngoại ô','B2','#2563eb'],['treasure','trân trọng','C1','#7c3aed'],['unwind','thư giãn','B2','#2563eb']].map(v=>`<div class="rounded-xl border border-slate-100 bg-slate-50 px-3 py-2"><div class="flex items-start justify-between gap-2"><p class="text-sm font-semibold leading-5 text-slate-800">${v[0]}</p><span class="inline-flex shrink-0 items-center gap-2 text-xs font-medium text-slate-500"><span class="h-2.5 w-2.5 rounded-full" style="background:${v[3]}"></span>${v[2]}</span></div><p class="mt-1 text-sm italic leading-5 text-slate-500">${v[1]}</p></div>`).join('')}</div>`;
    if(it==='note')return `<textarea placeholder="Ghi nhanh idea, từ mới, cấu trúc muốn thử ở lượt tiếp theo..." class="min-h-40 w-full rounded-xl border border-slate-200 bg-white p-3 text-sm leading-6 text-slate-700 outline-none focus:border-blue-300 focus:ring-2 focus:ring-blue-100"></textarea>`;
    if(it.startsWith('imp:'))return impCardRail(it.slice(4));
    return '';
  }).join('');
  icons();
}
function railAdd(kind){if(!railItems.includes(kind))railItems.unshift(kind);renderRail();}
function railRemove(it){railItems=railItems.filter(x=>x!==it);renderRail();}
function openAnalysis(key){
  const it='an:'+key;
  if(railItems.includes(it)){railItems=railItems.filter(x=>x!==it);railItems.unshift(it);}
  else railItems.unshift(it);
  renderRail();
  document.getElementById('railBody').scrollTop=0;
}
/* ===== CẢI THIỆN CÂU (coach): dữ liệu + hàm ===== */
const IMP_CAT={vocab:{c:'#2563eb',label:'Từ vựng'},grammar:{c:'#d97706',label:'Ngữ pháp'},cohesion:{c:'#059669',label:'Liên kết / Ý'},colloc:{c:'#7c3aed',label:'Collocation'}};
const IMPROVE={
 vocab:{label:'Nâng từ vựng',color:'#2563eb',target:'7.0',
   answer:"My hometown is a small town near Hanoi. I <U:vocab|genuinely cherish|'really enjoy' (A2) → 'genuinely cherish' (C1): diễn đạt tình cảm gắn bó mạnh và tự nhiên hơn> its <U:colloc|tranquil atmosphere|collocation tự nhiên thay cho 'peaceful atmosphere'> and the <U:vocab|warm-hearted locals|'friendly people' → 'warm-hearted locals' (C1): chính xác & nâng band>.",
   changes:[{cat:'vocab',text:"enjoy → cherish · peaceful → tranquil"},{cat:'colloc',text:"tranquil atmosphere · warm-hearted locals"}],
   phrases:['genuinely cherish','tranquil atmosphere','warm-hearted locals'],
   trans:'Quê tôi là một thị trấn nhỏ gần Hà Nội. Tôi thực sự trân trọng bầu không khí yên bình và những người dân ấm áp nơi đây.'},
 grammar:{label:'Đa dạng ngữ pháp',color:'#d97706',target:'7.0',
   answer:"My hometown is a small town near Hanoi, <U:grammar|which I cherish for its peaceful atmosphere|thêm mệnh đề quan hệ 'which…' để gộp 2 câu đơn thành 1 câu phức>. <U:grammar|Whenever I go back, I feel as if I can finally unwind|mệnh đề thời gian 'whenever' + cấu trúc so sánh 'as if'>.",
   changes:[{cat:'grammar',text:"Gộp câu phức bằng mệnh đề quan hệ 'which…'"},{cat:'grammar',text:"Mệnh đề thời gian 'whenever' + 'as if'"}],
   phrases:['which I cherish','as if I can','whenever I go back'],
   trans:'Quê tôi là một thị trấn nhỏ gần Hà Nội, nơi tôi yêu vì bầu không khí yên bình. Mỗi lần về, tôi như được thư giãn hoàn toàn.'},
 idea:{label:'Phát triển ý sâu',color:'#059669',target:'7.0',
   answer:"My hometown is a small town near Hanoi. I really enjoy its peaceful atmosphere — <U:cohesion|for instance, every morning I hear birds singing instead of traffic|thêm ví dụ cụ thể để phát triển ý, tránh nói chung chung>. <U:cohesion|That is why I always feel recharged whenever I visit|liên kết 'that is why' + nêu lý do, tăng mạch lạc>.",
   changes:[{cat:'cohesion',text:"Thêm ví dụ cụ thể (for instance…)"},{cat:'cohesion',text:"Liên kết & nêu lý do (that is why…)"}],
   phrases:['for instance','that is why','feel recharged'],
   trans:'Quê tôi là một thị trấn nhỏ gần Hà Nội. Tôi rất thích bầu không khí yên bình — ví dụ, mỗi sáng tôi nghe tiếng chim hót thay vì tiếng xe cộ. Vì vậy tôi luôn thấy được nạp lại năng lượng mỗi khi về.'},
};
let IMP_TAGS={};
function impTagged(goal){let i=0;return IMPROVE[goal].answer.replace(/<U:([^|]+)\|([^|]+)\|([^>]+)>/g,(mm,cat,text,why)=>{const idx=i++;IMP_TAGS[goal+'|'+idx]={cat,text,why};const col=IMP_CAT[cat].c;return `<span onclick="showImpTag(event,'${goal}',${idx})" class="cursor-pointer rounded px-1 font-semibold" style="color:${col};background:${col}1a;border-bottom:2px solid ${col}">${text}</span>`;});}
function showImpTag(e,goal,idx){e.stopPropagation();const d=IMP_TAGS[goal+'|'+idx];if(!d)return;const col=IMP_CAT[d.cat].c;const p=document.getElementById('fixpop');
  p.innerHTML=`<div class="mb-1 inline-flex items-center rounded-md px-2 py-0.5 text-[11px] font-semibold" style="background:${col}1a;color:${col}">${IMP_CAT[d.cat].label}</div><div class="text-[13px] font-semibold text-slate-800">${d.text}</div><p class="mt-1 text-[12.5px] leading-5 text-slate-600">${d.why}</p>`;
  p.classList.remove('hidden');p.style.left=Math.min(e.clientX+10,window.innerWidth-280)+'px';p.style.top=(e.clientY+12)+'px';}
function impCardRail(goal){const m=IMPROVE[goal];
  return `<div class="rounded-xl border bg-white p-3 shadow-sm" style="border-color:${m.color}40">
    <div class="flex items-start justify-between"><div class="flex items-center gap-2 text-sm font-semibold" style="color:${m.color}"><i data-lucide="wand-2" class="h-4 w-4"></i> Câu tốt hơn · ${m.label}</div>
      <button onclick="railRemove('imp:${goal}')" class="text-slate-300 hover:text-slate-500"><i data-lucide="x" class="h-4 w-4"></i></button></div>
    <div class="mt-1 text-[11px] text-slate-400">Hướng tới band ${m.target} · bấm từ tô màu để xem vì sao</div>
    <div class="mt-2 rounded-lg bg-slate-50/60 p-2.5 text-[13px] leading-7 text-slate-800">${impTagged(goal)}</div>
    <div class="mt-2 flex flex-wrap gap-1">${m.changes.map(ch=>`<span class="rounded-md px-2 py-0.5 text-[10.5px] font-semibold" style="background:${IMP_CAT[ch.cat].c}1a;color:${IMP_CAT[ch.cat].c}">${IMP_CAT[ch.cat].label}</span>`).join('')}</div>
    <div class="mt-3 flex gap-1.5">
      <button onclick="openImpModal('${goal}')" class="flex-1 rounded-md border border-slate-200 py-1.5 text-[12px] font-medium text-slate-600 hover:bg-slate-50">⛶ Bản đầy đủ</button>
      <button onclick="tryAgain()" class="flex-1 rounded-md bg-blue-600 py-1.5 text-[12px] font-medium text-white hover:bg-blue-700">🎙 Thử nói lại</button>
    </div>
  </div>`;}
function openImpModal(goal){const m=IMPROVE[goal];
  document.getElementById('impModal').innerHTML=`
    <button onclick="closeImpModal()" class="absolute right-4 top-4 text-slate-300 hover:text-slate-500"><i data-lucide="x" class="h-5 w-5"></i></button>
    <div class="mb-1 flex items-center gap-2 text-base font-bold text-slate-800"><i data-lucide="wand-2" class="h-4 w-4" style="color:${m.color}"></i> Câu trả lời tốt hơn · ${m.label}</div>
    <div class="mb-4 text-[12px] text-slate-400">Hướng tới band ${m.target} · bấm vào chỗ tô màu để xem vì sao & kỹ thuật</div>
    <div class="grid gap-5 md:grid-cols-2">
      <div>
        <div class="mb-2 text-sm font-bold text-slate-800">Câu nâng cấp</div>
        <div class="rounded-xl border border-slate-100 bg-slate-50/50 p-3 text-[14px] leading-8 text-slate-800">${impTagged(goal)}</div>
        <div class="mt-2 flex flex-wrap gap-3 text-[11px] text-slate-500">${Object.values(IMP_CAT).map(c=>`<span><span class="inline-block h-2.5 w-2.5 rounded-full align-middle" style="background:${c.c}"></span> ${c.label}</span>`).join('')}</div>
        <div class="mt-3 flex items-center gap-2"><button class="flex h-9 w-9 items-center justify-center rounded-full border-2 border-teal-400 text-teal-500 hover:bg-teal-50"><i data-lucide="volume-2" class="h-4 w-4"></i></button><span class="text-[12px] text-slate-500">Nghe mẫu câu nâng cấp</span></div>
        <div class="mt-3"><div class="text-[12px] font-medium text-slate-600">Dịch nghĩa</div><div class="mt-1.5 rounded-xl border border-slate-200 bg-slate-50 px-3 py-2.5 text-[13px] leading-6 text-emerald-700">${m.trans}</div></div>
      </div>
      <div class="space-y-4">
        <div><div class="mb-2 text-sm font-bold text-slate-800">Bạn đã nâng cấp gì</div><div class="space-y-1.5">${m.changes.map(ch=>`<div class="flex items-start gap-2 text-[12.5px]"><span class="mt-1 h-2 w-2 shrink-0 rounded-full" style="background:${IMP_CAT[ch.cat].c}"></span><span><b style="color:${IMP_CAT[ch.cat].c}">${IMP_CAT[ch.cat].label}:</b> ${ch.text}</span></div>`).join('')}</div></div>
        <div><div class="mb-2 text-sm font-bold text-slate-800">Cụm đáng học</div><div class="space-y-1.5">${m.phrases.map(p=>`<div class="flex items-center justify-between rounded-lg border border-slate-200 px-3 py-2"><span class="text-[13px] font-medium text-slate-800">${p}</span><button onclick="saveFlash('${p.replace(/'/g,"\\'")}',this)" class="flex items-center gap-1 rounded-md bg-violet-50 px-2 py-1 text-[11px] font-semibold text-violet-600 hover:bg-violet-100"><i data-lucide="bookmark-plus" class="h-3.5 w-3.5"></i> Lưu</button></div>`).join('')}</div></div>
        <button onclick="tryAgain()" class="w-full rounded-md bg-blue-600 py-2.5 text-sm font-semibold text-white hover:bg-blue-700"><i data-lucide="mic" class="inline h-4 w-4"></i> Thử nói lại theo gợi ý</button>
      </div>
    </div>`;
  document.getElementById('impScrim').classList.remove('hidden');
  document.getElementById('impModal').classList.remove('hidden');icons();}
function closeImpModal(){document.getElementById('impScrim').classList.add('hidden');document.getElementById('impModal').classList.add('hidden');}
function saveFlash(p,btn){btn.innerHTML='✓ Đã lưu';btn.classList.remove('bg-violet-50','text-violet-600');btn.classList.add('bg-emerald-50','text-emerald-600');showToast2('Đã lưu “'+p+'” vào từ vựng');}
function tryAgain(){closeImpModal();showToast2('Bấm nút 🎙 để ghi lại, áp dụng gợi ý vừa xem');const tl=document.getElementById('timeline');if(tl)tl.scrollTop=tl.scrollHeight;}
function doImprove(goal){const it='imp:'+goal;
  if(railItems.includes('loading'))return;
  if(railItems.includes(it)){railItems=railItems.filter(x=>x!==it);railItems.unshift(it);renderRail();document.getElementById('railBody').scrollTop=0;return;}
  railItems.unshift('loading');renderRail();
  setTimeout(()=>{railItems=railItems.filter(x=>x!=='loading');railItems.unshift(it);renderRail();document.getElementById('railBody').scrollTop=0;},1200);}
let toast2T;
function showToast2(msg){const t=document.getElementById('toast2');t.textContent=msg;t.classList.remove('hidden');clearTimeout(toast2T);toast2T=setTimeout(()=>t.classList.add('hidden'),2600);}

/* INIT */
renderPartTabs();renderTopicList();renderDetail();icons();
</script>
